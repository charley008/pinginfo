services:
  pinginfo:
    image: charley008/pinginfo:latest
    container_name: pinginfo
    restart: unless-stopped
    cap_add:
      - NET_RAW
    ports:
      - "8080:8080"
    environment:
      PINGINFO_BIND: 0.0.0.0:8080
      PINGINFO_DB: /app/data/pinginfo.db
      PINGINFO_RETENTION_DAYS: "30"
    volumes:
      - pinginfo-data:/app/data

volumes:
  pinginfo-data:
